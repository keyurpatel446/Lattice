# Local Neo4j for exercising the Neo4jGraphStore adapter end-to-end.
#
#   docker compose -f docker-compose.neo4j.yml up -d
#   NEO4J_URI=bolt://localhost:7687 NEO4J_USER=neo4j NEO4J_PASSWORD=latticetest \
#     pytest tests/test_neo4j_integration.py
#
# Browser UI: http://localhost:7474
services:
  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: "neo4j/latticetest"
      NEO4J_server_memory_pagecache_size: "256M"
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "latticetest", "RETURN 1"]
      interval: 5s
      timeout: 5s
      retries: 20
